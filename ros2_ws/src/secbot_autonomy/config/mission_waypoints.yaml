mission_sequencer:
  ros__parameters:
    # All coordinates in Rafeed frame: x_cm, y_cm, heading_deg
    # Each line is a command. Reorder/add/remove without recompiling.
    #
    # Commands:
    #   nav x y heading [timeout]         - drive to waypoint
    #   nav_rev x y heading [timeout]     - drive in reverse to waypoint
    #   nudge [duration]                  - nudge forward (default 1.0s)
    #   stop                              - stop robot
    #   wait duration                     - pause for duration seconds
    #   task id [timeout]                 - run task by ID (default timeout 30s)
    #   read_antenna label angle [idx]    - read antenna color (idx = storage slot)
    #   arm joint position speed          - move arm servo
    #   intake extend|retract [timeout]   - intake command (default timeout 10s)

    start_pose: [15.0, 15.0, 0.0]
    nudge_speed: 0.25

    #  Phase 1: Button 
    phase_button:
      - "nav 108.0 38.0 0.0"             # UWB placement
      - "nav_rev 38.0 38.0 0.0"          # reverse back
      - "nav 38.0 38.0 -45.0"            # turn -45
      - "nav 54.0 27.0 -45.0"            # drive diagonal
      - "nav 54.0 27.0 0.0"              # turn to 0
      - "nav 78.0 27.0 0.0"              # approach button
      - "nudge"                           # tap button 1
      - "nav_rev 78.0 27.0 0.0"          # reverse after tap 1
      - "nudge"                           # tap button 2
      - "nav_rev 78.0 28.0 0.0"          # reverse after tap 2
      - "nudge"                           # tap button 3
      - "nav_rev 30.0 27.0 0.0"          # reverse away from button
      - "read_antenna beacon 90.0 0"     # read beacon antenna (store slot 0)

    #  Phase 2: Keypad + Crater + Crank 
    phase_keypad:
      - "nav 30.0 27.0 45.0"             # turn +45
      - "nav 81.0 95.0 45.0"             # drive to keypad area
      - "nav 81.0 95.0 0.0"              # turn to 0
      - "nav_rev 38.0 95.0 0.0"          # reverse to keypad
      - "task 6"                          # keypad task
      - "nav 55.0 95.0 0.0"              # drive forward
      - "nav 55.0 95.0 90.0"             # turn to 90
      - "arm 6 90 200"                   # launch minibot (latch servo)
      - "wait 1.0"                        # wait for minibot deploy
      - "intake extend"                   # deploy intake extender
      - "nav 55.0 95.0 180.0"            # turn to 180
      - "nav_rev 91.0 95.0 180.0"        # reverse
      - "read_antenna keypad 90.0 1"     # read keypad antenna (store slot 1)
      - "nav 91.0 95.0 115.0"            # turn to 115
      - "read_antenna crater 90.0 2"     # read crater antenna (store slot 2)
      - "nav 90.0 110.0 45.0"            # wall alignment
      - "nav 100.0 190.0 90.0 20.0"      # safe path up (20s timeout)
      - "nav 53.0 225.0 180.0"           # align with crank
      - "nav_rev 53.0 225.0 150.0"       # reverse to crank
      - "nav 53.0 228.0 180.0"           # fine adjust
      - "nav 53.0 228.0 0.0"             # spin 180
      - "read_antenna crank 90.0 3"      # read crank antenna (store slot 3)
